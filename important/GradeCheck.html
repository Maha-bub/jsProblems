<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade check</title>
</head>
<body>
    <script>
        let mark=parseInt(prompt("Enter Your Mark:"));
        if(mark>=80){
            document.writeln("You got A+")
        }
        else if(mark>=70){
            document.writeln("You got A")
        }
        else if(mark>=60){
            document.writeln("You got B")
        }
        else{
            document.writeln("You are failed!")
        }
    </script>
</body>
</html>
