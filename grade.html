<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade</title>
</head>
<body>
    <script>
        let mark= parseInt(prompt("Enter your mark"))
        

        if(mark>=80){
            document.writeln("A+");
        } 
       else if(mark>=70){
            document.writeln("A");
        } 
        else if(mark>=60 ){
            document.writeln("B");
        } 
       
        else{
            document.writeln("F");
        }

    </script>
</body>
</html>
