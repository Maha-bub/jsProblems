<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find numbers of positive,negative and zero </title>
</head>

<body>
    <script>
        const arr = [10, 45, 12, 1, 41, 25, 1, 452, -5, -2, 5, 7, 10, 41, 0, 1, -56, 69, 78, 0, 12, 2, -5];
        let positive = 0;
        let negative = 0;
        let zero = 0;
        let sum=0;
        for (let i = 0; i < arr.length; i++) {
            if (arr[i] > 0) {
                positive++;
                sum+=arr[i];

            }
            else if (arr[i] < 0) {
                negative++;
                sum+=arr[i];
            }
            else {
                zero++;
            }
        } 
        document.writeln("Number of positive numbers in the array is = " + positive);
        document.writeln("<br>Number of negative numbers in the array is = " + negative);
        document.writeln("<br>Number of zeros in the array is = " + zero);
        document.writeln("<br>Sum of all the number="+sum);
    </script>
</body>

</html>
