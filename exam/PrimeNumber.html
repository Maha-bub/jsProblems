<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Number Check Program</title>
</head>

<body>
    <script>
        let num = parseInt(prompt("Enter a number :"));
        let count = 0;
        if (num <= 1) {
            count = 1;
        }

        for (let i = 2; i <= num/2; i++) {
            if (num % i === 0) {
                count++;
                break;

            }

        }

        if (count === 0) {
            document.writeln("This is prime.")
        }
        else {
            document.writeln("Not Prime")
        }
    </script>
</body>

</html>
