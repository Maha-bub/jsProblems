<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Number check</title>
</head>

<body>
    <script>
        let number = parseInt(prompt("Enter A Number"));
        let count = 0;
        // we know that 0 and 1 is not prime
        if (number <= 1) {
            count = 1;
            // document.writeln("This is not Prime")
        }
        for (let i = 2; i < number/2; i++) {
            if (number % i === 0) {
                count++;
                break;
            }

        }
        if (count == 0) {
            document.writeln("This number is Prime.")
        }
        else {
            document.writeln("This number is not Prime")
        };

    </script>
</body>

</html>
